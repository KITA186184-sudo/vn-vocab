<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body {
  height: 100%;
  overflow: hidden;
}
body {
  font-family: -apple-system, 'Hiragino Sans', 'Meiryo', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: env(safe-area-inset-top, 12px) 16px env(safe-area-inset-bottom, 16px);
  height: 100dvh;
  overflow-y: auto;
}
h1 { font-size:1.2rem; color:#a78bfa; margin-bottom:4px; letter-spacing:.05em; }
.stats { font-size:.75rem; color:#777; margin-bottom:12px; }
.stats span { color:#a78bfa; font-weight:700; }

/* Install banner */
#installBanner {
  display:none;
  align-items:center;
  gap:10px;
  background:#312e81;
  border:1px solid #4c1d95;
  border-radius:12px;
  padding:10px 14px;
  font-size:.78rem;
  color:#c4b5fd;
  margin-bottom:12px;
  width:100%;
  max-width:480px;
}
#installBanner button {
  margin-left:auto;
  background:#a78bfa;
  color:#fff;
  border:none;
  border-radius:8px;
  padding:5px 12px;
  font-size:.78rem;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
}
#installBanner .close-btn {
  background:transparent;
  color:#888;
  padding:2px 6px;
  margin-left:0;
  font-size:1rem;
}

/* Mode tabs */
.mode-tabs { display:flex; gap:8px; margin-bottom:12px; }
.mode-tab {
  padding:6px 18px; border-radius:20px;
  border:1.5px solid #3f3f5e;
  background:transparent; color:#aaa;
  cursor:pointer; font-size:.8rem;
  transition:all .2s;
  -webkit-appearance:none;
}
.mode-tab.active { background:#a78bfa; border-color:#a78bfa; color:#fff; font-weight:700; }

/* Card */
.card-area {
  perspective:1000px;
  width:100%; max-width:480px;
  height:200px;
  cursor:pointer;
  margin-bottom:12px;
  touch-action:pan-y;
  user-select:none;
}
.card {
  width:100%; height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .42s cubic-bezier(.4,2,.6,1);
}
.card.flipped { transform:rotateY(180deg); }
.card-face {
  position:absolute; width:100%; height:100%;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:20px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:24px; text-align:center;
}
.card-front {
  background:linear-gradient(135deg,#312e81,#1e1b4b);
  border:1.5px solid #4c1d95;
}
.card-back {
  background:linear-gradient(135deg,#065f46,#064e3b);
  border:1.5px solid #065f46;
  transform:rotateY(180deg);
}
.card-label { font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:#a78bfa; margin-bottom:10px; }
.card-back .card-label { color:#34d399; }
.card-word { font-size:1.9rem; font-weight:700; color:#fff; line-height:1.2; margin-bottom:6px; }
.card-hint { font-size:.68rem; color:#666; margin-top:10px; }
.card-meaning { font-size:1.1rem; font-weight:600; color:#d1fae5; line-height:1.5; }
.swipe-hint { font-size:.64rem; color:#555; text-align:center; margin-bottom:8px; }

/* Progress */
.progress-bar-wrap {
  width:100%; max-width:480px; height:5px;
  background:#2d2d4e; border-radius:3px;
  margin-bottom:12px; overflow:hidden;
}
.progress-bar {
  height:100%;
  background:linear-gradient(90deg,#a78bfa,#60a5fa);
  border-radius:3px; transition:width .3s;
}

/* Controls */
.controls {
  display:flex; gap:10px; margin-bottom:10px; align-items:center;
}
.btn {
  padding:11px 22px; border-radius:12px; border:none;
  font-size:.9rem; font-weight:600;
  cursor:pointer; transition:all .15s;
  -webkit-appearance:none;
}
.btn:active { transform:scale(.95); }
.btn-prev { background:#2d2d4e; color:#aaa; }
.btn-next { background:#a78bfa; color:#fff; }

/* Mark */
.mark-btns { display:flex; gap:10px; margin-bottom:12px; }
.btn-known,.btn-unknown {
  padding:9px 20px; border-radius:10px;
  font-size:.84rem; font-weight:700;
  cursor:pointer; transition:all .15s;
  -webkit-appearance:none;
}
.btn-known { background:#065f46; color:#34d399; border:1.5px solid #059669; }
.btn-unknown { background:#450a0a; color:#f87171; border:1.5px solid #b91c1c; }

/* Options */
.options { display:flex; gap:7px; flex-wrap:wrap; justify-content:center; margin-bottom:8px; }
.btn-sm {
  padding:7px 14px; border-radius:10px;
  border:1.5px solid #3f3f5e;
  background:transparent; color:#bbb;
  font-size:.75rem; cursor:pointer;
  transition:all .15s;
  -webkit-appearance:none;
}
.btn-sm:active { opacity:.7; }
.btn-sm.active { background:#312e81; border-color:#a78bfa; color:#a78bfa; }

/* Score */
.score-row { display:flex; gap:16px; font-size:.75rem; color:#666; }
.score-row .ok { color:#34d399; }
.score-row .ng { color:#f87171; }

/* Quiz */
.quiz-choices {
  display:grid; grid-template-columns:1fr 1fr;
  gap:9px; width:100%; max-width:480px; margin-bottom:12px;
}
.choice-btn {
  padding:14px 8px; border-radius:12px;
  border:1.5px solid #3f3f5e;
  background:#1e1e3a; color:#ddd;
  font-size:.85rem; cursor:pointer;
  transition:all .2s; text-align:center;
  line-height:1.3; -webkit-appearance:none;
}
.choice-btn.correct { background:#065f46; border-color:#059669; color:#d1fae5; }
.choice-btn.wrong { background:#450a0a; border-color:#b91c1c; color:#fca5a5; }
.choice-btn:disabled { cursor:default; }
.complete-msg { text-align:center; padding:24px; color:#a78bfa; font-size:1rem; grid-column:1/-1; }
</style>
</head>

<div id="quizMode" style="display:none">

  <div class="quiz-choices" id="quizChoices"></div>
  <div class="score-row" style="margin-bottom:10px">
    <span class="ok">正解: <span id="quizCorrect">0</span></span>
    <span class="ng">不正解: <span id="quizWrong">0</span></span>
  </div>
</div>

<div class="options">

</div>

vn": "điểm", "jp": "点・ポイント"}, {"vn": "giá", "jp": "価格"}, {"vn": "đắt", "jp": "高い（値段）"}, {"vn": "dễ bị hỏng", "jp": "壊れやすい"}, {"vn": "tức là", "jp": "つまり・すなわち"}, {"vn": "đồng thời", "jp": "同時に・また"}, {"vn": "ngược lại", "jp": "反対に・逆に"}, {"vn": "nhà cao tầng", "jp": "高層ビル"}, {"vn": "tìm kiếm", "jp": "探す・捜索する"}, {"vn": "đầu tiên", "jp": "最初の"}, {"vn": "chiếc bút bi", "jp": "ボールペン"}, {"vn": "nặng hơn", "jp": "より重い"}];

let deck=[...ALL_DATA], idx=0, flipped=false;
let shuffled=false, jpFirst=false, unknownOnly=false;
let knownSet=new Set(), unknownSet=new Set();
let mode='flash';
let quizCorrect=0, quizWrong=0, quizAnswered=false;
let quizIdx=0, quizDeck=[];

// PWA Install
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('installBanner').style.display='flex';
});
document.getElementById('installBtn').addEventListener('click', async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('installBanner').style.display='none';
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('installBanner').style.display='none';
});

// iOS hint
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
if(isIOS && !isStandalone){
  const b = document.getElementById('installBanner');
  b.style.display='flex';
  b.querySelector('span').textContent='📱 Safariで「共有」→「ホーム画面に追加」でアプリ化できます';
  b.querySelector('#installBtn').style.display='none';
}

// Swipe
let touchStartX=0, touchStartY=0;
const cardArea = document.getElementById('cardArea');
cardArea.addEventListener('touchstart', e=>{
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
cardArea.addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)*1.5){
    e.preventDefault();
    if(dx<0) nextCard(); else prevCard();
  }
});

function getActiveDeck(){
  if(unknownOnly && unknownSet.size>0){
    return ALL_DATA.filter((_,i)=>unknownSet.has(i));
  }
  return [...ALL_DATA];
}

function rebuildDeck(){
  let base=getActiveDeck();
  if(shuffled){
    for(let i=base.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [base[i],base[j]]=[base[j],base[i]];
    }
  }
  deck=base; idx=0; flipped=false;
  updateCard();
}

function updateCard(){
  if(!deck.length) return;
  const item=deck[idx];
  document.getElementById('totalCount').textContent=ALL_DATA.length;
  document.getElementById('setCount').textContent=deck.length;
  document.getElementById('posStr').textContent=idx+1;
  document.getElementById('progressBar').style.width=((idx+1)/deck.length*100)+'%';
  document.getElementById('vnWord').textContent=jpFirst?item.jp:item.vn;
  document.getElementById('jpMeaning').textContent=jpFirst?item.vn:item.jp;
  document.getElementById('card').classList.remove('flipped');
  flipped=false;
  document.getElementById('markBtns').style.display='none';
  document.getElementById('knownCount').textContent=knownSet.size;
  document.getElementById('unknownCount').textContent=unknownSet.size;
}

function flipCard(){
  const card=document.getElementById('card');
  flipped=!flipped;
  card.classList.toggle('flipped',flipped);
  document.getElementById('markBtns').style.display=flipped?'flex':'none';
}

function nextCard(){ idx=(idx+1)%deck.length; updateCard(); }
function prevCard(){ idx=(idx-1+deck.length)%deck.length; updateCard(); }

function markCard(known){
  const origIdx=ALL_DATA.indexOf(deck[idx]);
  if(known){ knownSet.add(origIdx); unknownSet.delete(origIdx); }
  else{ unknownSet.add(origIdx); knownSet.delete(origIdx); }
  nextCard();
}

function toggleShuffle(){
  shuffled=!shuffled;
  document.getElementById('btnShuffle').classList.toggle('active',shuffled);
  rebuildDeck(); if(mode==='quiz') startQuiz();
}
function toggleJpFirst(){
  jpFirst=!jpFirst;
  document.getElementById('btnJpFirst').classList.toggle('active',jpFirst);
  updateCard(); if(mode==='quiz') startQuiz();
}
function toggleUnknownOnly(){
  unknownOnly=!unknownOnly;
  document.getElementById('btnUnknownOnly').classList.toggle('active',unknownOnly);
  rebuildDeck(); if(mode==='quiz') startQuiz();
}
function resetAll(){
  knownSet.clear(); unknownSet.clear();
  quizCorrect=0; quizWrong=0;
  rebuildDeck(); if(mode==='quiz') startQuiz();
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach((t,i)=>{
    t.classList.toggle('active',(i===0&&m==='flash')||(i===1&&m==='quiz'));
  });
  document.getElementById('flashMode').style.display=m==='flash'?'':'none';
  document.getElementById('quizMode').style.display=m==='quiz'?'':'none';
  if(m==='quiz') startQuiz();
}

function startQuiz(){
  quizCorrect=0; quizWrong=0;
  quizDeck=getActiveDeck();
  if(shuffled){
    for(let i=quizDeck.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [quizDeck[i],quizDeck[j]]=[quizDeck[j],quizDeck[i]];
    }
  }
  quizIdx=0; showQuizCard();
}

function showQuizCard(){
  quizAnswered=false;
  if(quizIdx>=quizDeck.length){
    document.getElementById('quizChoices').innerHTML=`<div class="complete-msg">🎉 完了！<br>正解率: ${quizCorrect}/${quizDeck.length}</div>`;
    document.getElementById('quizVn').textContent='終了';
    return;
  }
  const item=quizDeck[quizIdx];
  document.getElementById('quizVn').textContent=jpFirst?item.jp:item.vn;
  document.getElementById('quizProgress').style.width=((quizIdx+1)/quizDeck.length*100)+'%';
  document.getElementById('posStr').textContent=quizIdx+1;
  document.getElementById('setCount').textContent=quizDeck.length;
  document.getElementById('quizCorrect').textContent=quizCorrect;
  document.getElementById('quizWrong').textContent=quizWrong;
  let others=ALL_DATA.filter(d=>d!==item), wrong=[];
  while(wrong.length<3){
    const r=others[Math.floor(Math.random()*others.length)];
    if(!wrong.includes(r)) wrong.push(r);
  }
  let choices=[...wrong,item].sort(()=>Math.random()-.5);
  const container=document.getElementById('quizChoices');
  container.innerHTML='';
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=jpFirst?c.vn:c.jp;
    btn.onclick=()=>checkAnswer(btn,c===item,container);
    container.appendChild(btn);
  });
}

function checkAnswer(btn,isCorrect,container){
  if(quizAnswered) return;
  quizAnswered=true;
  const correctText=jpFirst?quizDeck[quizIdx].vn:quizDeck[quizIdx].jp;
  if(isCorrect){ btn.classList.add('correct'); quizCorrect++; }
  else{
    btn.classList.add('wrong');
    container.querySelectorAll('.choice-btn').forEach(b=>{
      if(b.textContent===correctText) b.classList.add('correct');
    });
    quizWrong++;
  }
  container.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  document.getElementById('quizCorrect').textContent=quizCorrect;
  document.getElementById('quizWrong').textContent=quizWrong;
  setTimeout(()=>{ quizIdx++; showQuizCard(); },900);
}

rebuildDeck();
</script>
